name: e2e-test
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  CI: "true"
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  RUSTFLAGS: -D warnings
jobs:
  fdo:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-deps
      - uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: cache container build
        id: cache-container
        uses: actions/cache@v5.0.3
        with:
          path: .tmp/cache/containers
          key: ${{ runner.os }}-${{ hashFiles('justfile', 'scripts/**/*.sh', 'containers/**') }}
      - uses: taiki-e/install-action@v2.49.43
        with:
          tool: just
      - run: |
          just setup
          just run
  astarte:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-deps
      - uses: actions-rust-lang/setup-rust-toolchain@v1.15.4
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: astarte-platform/astarte-cluster-action@fd17bc7e37c50c84650dbcae112c02089fd20efd
        with:
          astarte_version: 1.3.0
          # Enable the fdo feature using kustomize
          kustomize_astarte_patch: |
            - op: add
              path: /spec/fdo
              value:
                enable: true
                rendezvousServer:
                  connection:
                    host: http://fdo-rendezvous.astarte.svc.cluster.local
                    port: 8041
            - op: add
              path: /spec/components
              value:
                housekeeping:
                  image: docker.io/astarte/astarte_housekeeping:1.4-snapshot
                realmManagement:
                  image: docker.io/astarte/astarte_realm_management:1.4-snapshot
                pairing:
                  image: docker.io/astarte/astarte_pairing:1.4-snapshot
                  additionalEnv:
                    - name: ASTARTE_VAULT_URL
                      value: http://openbao.astarte.svc.cluster.local:8200
                    - name: ASTARTE_VAULT_AUTHENTICATION_MECHANISM
                      value: "token"
                    - name: ASTARTE_VAULT_TOKEN
                      value: "astarte_token"
                dataUpdaterPlant:
                  image: docker.io/astarte/astarte_data_updater_plant:1.4-snapshot
                appengineApi:
                  image: docker.io/astarte/astarte_appengine_api:1.4-snapshot
                triggerEngine:
                  image: docker.io/astarte/astarte_trigger_engine:1.4-snapshot
      - run: |
          kubectl apply -f scripts/e2e-test/rendezvous.yaml
          kubectl apply -f scripts/e2e-test/openbao.yaml
      - run: |
          echo '127.0.0.1 test.api.autotest.astarte-platform.org' | sudo tee -a /etc/hosts
      - run: ./scripts/e2e-test/run.sh
      - name: post
        if: ${{ failure() || cancelled() }}
        run: ./scripts/e2e-test/post.sh 'astarte'
